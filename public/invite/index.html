<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="utf-8">
    <title>تحدي الدومينو - انضم الآن</title>
    <!-- Social Media Open Graph Meta Tags -->
    <meta property="og:title" content="لعبة الدومينو - صديقك يتحداك!" />
    <meta property="og:description"
        content="لقد أرسل لك صديقك تحدياً في لعبة الدومينو. هل أنت مستعد للعب؟ اضغط هنا للانضمام إلى الغرفة." />
    <meta property="og:url" content="https://elhabdomino.fun/invite" />
    <meta property="og:image" content="https://elhabdomino.fun/challenge_invite.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="لعبة الدومينو" />
    <meta property="og:locale" content="ar_AR" />

    <!-- Twitter Card Meta Tags -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="لعبة الدومينو - صديقك يتحداك!" />
    <meta name="twitter:description" content="لقد أرسل لك صديقك تحدياً في لعبة الدومينو. هل أنت مستعد للعب؟" />
    <meta name="twitter:image" content="https://elhabdomino.fun/challenge_invite.png" />

    <script>
        // Use window.location.replace for better compatibility with In-App Browsers
        window.addEventListener('load', () => {
            const params = new URLSearchParams(window.location.search);
            const roomId = params.get("r");
            const targetUrl = roomId ? "/#/room/" + roomId : "/";

            // Set manual link just in case
            const manualLink = document.getElementById('manual-link');
            if (manualLink) manualLink.href = targetUrl;

            // Short delay to allow mobile browsers to settle
            setTimeout(() => {
                window.location.replace(targetUrl);
            }, 800);
        });
    </script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #1a1a1a;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            direction: rtl;
        }

        .container {
            text-align: center;
        }

        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #f57c00;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 2s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="loader"></div>
        <p>جاري تحويلك إلى اللعبة...</p>
        <p><a id="manual-link" href="/" style="color: #f57c00; text-decoration: none; font-size: 0.9rem;">إذا لم يتم
                تحويلك تلقائياً، اضغط هنا للانضمام</a></p>
    </div>
</body>

</html>
